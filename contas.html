<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Contas a Pagar</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f4f4;
    }

    .topo {
      background: #007bff;
      color: white;
      padding: 15px;
      font-size: 24px;
    }

    .container {
      width: 90%;
      margin: auto;
      margin-top: 30px;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    input, select  {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
      box-sizing: border-box;
    }

    button {
      margin-top: 15px;
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      background: #007bff;
      color: white;
      margin-right: 5px;
    }

    button:hover {
      background: #0056b3;
    }

    .btn-vermelho {
      background: #dc3545;
    }

    .btn-vermelho:hover {
      background: #b02a37;
    }

    table {
      width: 100%;
      margin-top: 30px;
      border-collapse: collapse;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 10px;
      text-align: center;
    }

    th {
      background: #007bff;
      color: white;
    }
  </style>
</head>

<body>

  <div class="topo">
    Contas a Pagar
  </div>

  <div class="container">

    <h2>Nova Conta</h2>

    <input type="hidden" id="conta_pagar_id">

    <input type="number" id="valor" placeholder="Valor">

    <input type="number" id="data_vencimento" placeholder="Data vencimento Ex: 20250510">

    <input type="number" id="data_pagamento" placeholder="Data pagamento Ex: 20250515">

    <input type="text" id="tipo_titulo_id" placeholder="ID tipo título">

    <input type="text" id="atualizado_por" placeholder="ID usuário">

    <input type="number" id="atualizado_em" placeholder="Atualizado em Ex: 20250511">

    <input type="text" id="emprestimo_id" placeholder="ID empréstimo">
    <input type="text" id="viagem_id" placeholder="ID viagem">


   <select id="funcionario_id">
  <option value="">Selecione o funcionário</option>
</select>

<select id="cliente_id">
  <option value="">Selecione o cliente</option>
</select>

<select id="fornecedor_id">
  <option value="">Selecione o fornecedor</option>
</select>

    <button onclick="novaConta()">Nova</button>

    <button onclick="incluirConta()">Incluir</button>

    <button onclick="editarConta()">Editar</button>

    <button onclick="salvarEdicaoConta()">Salvar edição</button>

    <button class="btn-vermelho" onclick="excluirConta()">
      Excluir
    </button>

    <button onclick="window.location.href='home.html'">
      Voltar
    </button>

    <table>

      <thead>
        <tr>
          <th></th>
          <th>ID</th>
          <th>Valor</th>
          <th>Vencimento</th>
          <th>Pagamento</th>
          <th>Tipo Título</th>
          <th>Usuário</th>
          <th>Funcionário</th>
          <th>Cliente</th>
          <th>Fornecedor</th>
        </tr>
      </thead>

      <tbody id="tabelaContas"></tbody>

    </table>

  </div>

  <script>

    const API_URL = "https://backend-login-iwgo.onrender.com";
    function carregarFornecedoresSelect() {
  fetch(`${API_URL}/fornecedores-lista`)
    .then(res => res.json())
    .then(fornecedores => {
      const fornecedor = document.getElementById("fornecedor_id");

      fornecedor.innerHTML = '<option value="">Selecione o fornecedor</option>';

      fornecedores.forEach(f => {
        fornecedor.innerHTML += `<option value="${f.id}">${f.marca}</option>`;
      });
    });
}
function carregarPessoas() {
  fetch(`${API_URL}/pessoas`)
    .then(res => res.json())
    .then(pessoas => {
      const funcionario = document.getElementById("funcionario_id");
      const cliente = document.getElementById("cliente_id");
      const fornecedor = document.getElementById("fornecedor_id");

      pessoas.forEach(p => {
        funcionario.innerHTML += `<option value="${p.pessoa_id}">${p.nome}</option>`;
        cliente.innerHTML += `<option value="${p.pessoa_id}">${p.nome}</option>`;
        fornecedor.innerHTML += `<option value="${p.pessoa_id}">${p.nome}</option>`;
      });
    });
}
    function montarConta() {

      return {
        valor: document.getElementById("valor").value || null,
        data_vencimento: document.getElementById("data_vencimento").value || null,
        data_pagamento: document.getElementById("data_pagamento").value || null,
        tipo_titulo_id: document.getElementById("tipo_titulo_id").value || null,
        atualizado_por: document.getElementById("atualizado_por").value || null,
        atualizado_em: document.getElementById("atualizado_em").value || null,
        emprestimo_id: document.getElementById("emprestimo_id").value || null,
        funcionario_id: document.getElementById("funcionario_id").value || null,
        cliente_id: document.getElementById("cliente_id").value || null,
        viagem_id: document.getElementById("viagem_id").value || null,
        fornecedor_id: document.getElementById("fornecedor_id").value || null
      };

    }

    function novaConta() {

      limparCampos();

      alert("Preencha os campos e clique em Incluir");

    }

    function incluirConta() {

      const conta = montarConta();

      if (!conta.valor) {
        alert("Preencha o valor");
        return;
      }

      fetch(`${API_URL}/contas-pagar`, {

        method: "POST",

        headers: {
          "Content-Type": "application/json"
        },

        body: JSON.stringify(conta)

      })

      .then(res => res.json())

      .then(data => {

        alert(data.mensagem || data.erro || "Conta incluída");

        limparCampos();

        carregarContas();

      })

      .catch(() => {

        alert("Erro ao incluir conta");

      });

    }

    function editarConta() {

      const selecionado = document.querySelector('input[name="selecionado"]:checked');

      if (!selecionado) {

        alert("Selecione uma conta");

        return;

      }

      selecionarConta(Number(selecionado.value));

      alert("Agora altere os campos e clique em Salvar edição");

    }

    function salvarEdicaoConta() {

      const id = document.getElementById("conta_pagar_id").value;

      if (!id) {

        alert("Selecione uma conta");

        return;

      }

      const conta = montarConta();

      fetch(`${API_URL}/contas-pagar/${id}`, {

        method: "PUT",

        headers: {
          "Content-Type": "application/json"
        },

        body: JSON.stringify(conta)

      })

      .then(res => res.json())

      .then(data => {

        alert(data.mensagem || data.erro || "Conta atualizada");

        limparCampos();

        carregarContas();

      })

      .catch(() => {

        alert("Erro ao editar conta");

      });

    }

    function carregarContas() {

      fetch(`${API_URL}/contas-pagar`)

      .then(res => res.json())

      .then(contas => {

        const tabela = document.getElementById("tabelaContas");

        tabela.innerHTML = "";

        contas.forEach(c => {

          tabela.innerHTML += `
            <tr onclick="selecionarConta(${c.conta_pagar_id})">

              <td>
                <input type="radio" name="selecionado" value="${c.conta_pagar_id}">
              </td>

              <td>${c.conta_pagar_id}</td>

              <td>${c.valor || ""}</td>

              <td>${c.data_vencimento || ""}</td>

              <td>${c.data_pagamento || ""}</td>

              <td>${c.tipo_titulo_id || ""}</td>

              <td>${c.atualizado_por || ""}</td>

              <td>${c.funcionario_nome || ""}</td>

              <td>${c.cliente_id || ""}</td>

             <td>${c.fornecedor_nome || ""}</td>

            </tr>
          `;

        });

      });

    }

    function selecionarConta(id) {

      fetch(`${API_URL}/contas-pagar`)

      .then(res => res.json())

      .then(contas => {

        const conta = contas.find(c => c.conta_pagar_id === id);

        if (!conta) return;

        document.getElementById("conta_pagar_id").value = conta.conta_pagar_id;
        document.getElementById("valor").value = conta.valor || "";
        document.getElementById("data_vencimento").value = conta.data_vencimento || "";
        document.getElementById("data_pagamento").value = conta.data_pagamento || "";
        document.getElementById("tipo_titulo_id").value = conta.tipo_titulo_id || "";
        document.getElementById("atualizado_por").value = conta.atualizado_por || "";
        document.getElementById("atualizado_em").value = conta.atualizado_em || "";
        document.getElementById("emprestimo_id").value = conta.emprestimo_id || "";
        document.getElementById("funcionario_id").value = conta.funcionario_id || "";
        document.getElementById("cliente_id").value = conta.cliente_id || "";
        document.getElementById("viagem_id").value = conta.viagem_id || "";
        document.getElementById("fornecedor_id").value = conta.fornecedor_id || "";

      });

    }

    function excluirConta() {

      const id = document.getElementById("conta_pagar_id").value;

      if (!id) {

        alert("Selecione uma conta");

        return;

      }

      if (confirm("Deseja excluir esta conta?")) {

        fetch(`${API_URL}/contas-pagar/${id}`, {

          method: "DELETE"

        })

        .then(res => res.json())

        .then(data => {

          alert(data.mensagem || data.erro || "Conta excluída");

          limparCampos();

          carregarContas();

        });

      }

    }

    function limparCampos() {

      document.getElementById("conta_pagar_id").value = "";
      document.getElementById("valor").value = "";
      document.getElementById("data_vencimento").value = "";
      document.getElementById("data_pagamento").value = "";
      document.getElementById("tipo_titulo_id").value = "";
      document.getElementById("atualizado_por").value = "";
      document.getElementById("atualizado_em").value = "";
      document.getElementById("emprestimo_id").value = "";
      document.getElementById("funcionario_id").value = "";
      document.getElementById("cliente_id").value = "";
      document.getElementById("viagem_id").value = "";
      document.getElementById("fornecedor_id").value = "";

    }

    carregarPessoas();
carregarFornecedoresSelect();
carregarContas();

  </script>

</body>
</html>
