<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Cadastro de Fornecedores</title>

<style>
body{
  font-family: Arial;
  margin:0;
  background:#f4f4f4;
}

.topo{
  background:#007bff;
  color:white;
  padding:15px;
  font-size:24px;
}

.container{
  width:90%;
  margin:auto;
  margin-top:30px;
  background:white;
  padding:20px;
  border-radius:10px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

input, select{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:1px solid #ccc;
  border-radius:5px;
}

button{
  margin-top:15px;
  padding:10px 20px;
  border:none;
  border-radius:5px;
  cursor:pointer;
  background:#007bff;
  color:white;
}

button:hover{
  background:#0056b3;
}

table{
  width:100%;
  margin-top:30px;
  border-collapse:collapse;
}

th, td{
  border:1px solid #ccc;
  padding:10px;
  text-align:center;
}

th{
  background:#007bff;
  color:white;
}
</style>
</head>

<body>

<div class="topo">
Cadastro de Fornecedores
</div>

<div class="container">

<h2>Novo Fornecedor</h2>
  
<input type="hidden" id="fornecedor_id">
  
<input type="text" id="marca" placeholder="Marca">

<input type="text" id="cnpj" placeholder="CNPJ">

<input type="text" id="telefone" placeholder="Telefone">

<select id="categoria">
<option>Hidráulica</option>
<option>Elétrica</option>
<option>Cimento</option>
<option>Tintas</option>
<option>Ferramentas</option>
</select>

<button onclick="incluirFornecedor()">Incluir</button>
<button onclick="editarFornecedor()">Editar</button>
<button onclick="salvarEdicaoFornecedor()">Salvar edição</button>
<button class="btn-vermelho" onclick="excluirFornecedor()">Excluir selecionado</button>
<button onclick="window.location.href='home.html'">Voltar</button>

<table>
<thead>
<tr>
<th>ID</th>
<th>Marca</th>
<th>CNPJ</th>
<th>Telefone</th>
<th>Categoria</th>
</tr>
</thead>

<tbody id="tabelaFornecedores">

</tbody>
</table>

</div>

<script>




const API_URL = "https://backend-login-iwgo.onrender.com";

function carregarFornecedores() {
  fetch(`${API_URL}/fornecedores`)
    .then(res => res.json())
    .then(fornecedores => {
      const tabela = document.getElementById("tabelaFornecedores");
      tabela.innerHTML = "";

      fornecedores.forEach(f => {
        tabela.innerHTML += `
          <tr onclick="selecionarFornecedor(${f.id})">
            <td><input type="radio" name="selecionado" value="${f.id}"></td>
            <td>${f.id}</td>
            <td>${f.marca || ""}</td>
            <td>${f.cnpj || ""}</td>
            <td>${f.telefone || ""}</td>
            <td>${f.categoria || ""}</td>
          </tr>
        `;
      });
    });
}

function montarFornecedor() {
  return {
    marca: document.getElementById("marca").value,
    cnpj: document.getElementById("cnpj").value,
    telefone: document.getElementById("telefone").value,
    categoria: document.getElementById("categoria").value
  };
}

function incluirFornecedor() {
  const fornecedor = montarFornecedor();

  if (!fornecedor.marca || !fornecedor.cnpj || !fornecedor.telefone) {
    alert("Preencha todos os campos");
    return;
  }

  fetch(`${API_URL}/fornecedores`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(fornecedor)
  })
  .then(res => res.json())
  .then(data => {
    alert(data.mensagem || data.erro || "Fornecedor incluído");
    limparCamposFornecedor();
    carregarFornecedores();
  })
  .catch(() => {
    alert("Erro ao incluir fornecedor");
  });
}

function editarFornecedor() {
  const selecionado = document.querySelector('input[name="selecionado"]:checked');

  if (!selecionado) {
    alert("Selecione um fornecedor para editar");
    return;
  }

  selecionarFornecedor(Number(selecionado.value));
  alert("Agora altere os campos e clique em Salvar edição");
}

function salvarEdicaoFornecedor() {
  const id = document.getElementById("fornecedor_id").value;

  if (!id) {
    alert("Selecione um fornecedor antes de salvar a edição");
    return;
  }

  const fornecedor = montarFornecedor();

  fetch(`${API_URL}/fornecedores/${id}`, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(fornecedor)
  })
  .then(res => res.json())
  .then(data => {
    alert(data.mensagem || data.erro || "Fornecedor atualizado");
    limparCamposFornecedor();
    carregarFornecedores();
  })
  .catch(() => {
    alert("Erro ao editar fornecedor");
  });
}

function selecionarFornecedor(id) {
  fetch(`${API_URL}/fornecedores`)
    .then(res => res.json())
    .then(fornecedores => {
      const fornecedor = fornecedores.find(f => f.id === id);

      if (!fornecedor) return;

      document.getElementById("fornecedor_id").value = fornecedor.id;
      document.getElementById("marca").value = fornecedor.marca || "";
      document.getElementById("cnpj").value = fornecedor.cnpj || "";
      document.getElementById("telefone").value = fornecedor.telefone || "";
      document.getElementById("categoria").value = fornecedor.categoria || "";
    });
}

function excluirFornecedor() {
  const id = document.getElementById("fornecedor_id").value;

  if (!id) {
    alert("Selecione um fornecedor para excluir");
    return;
  }

  if (confirm("Deseja excluir este fornecedor?")) {
    fetch(`${API_URL}/fornecedores/${id}`, {
      method: "DELETE"
    })
    .then(res => res.json())
    .then(data => {
      alert(data.mensagem || data.erro || "Fornecedor excluído");
      limparCamposFornecedor();
      carregarFornecedores();
    });
  }
}

function limparCamposFornecedor() {
  document.getElementById("fornecedor_id").value = "";
  document.getElementById("marca").value = "";
  document.getElementById("cnpj").value = "";
  document.getElementById("telefone").value = "";
  document.getElementById("categoria").value = "Hidráulica";
}

carregarFornecedores();



</script>

</body>
</html>
