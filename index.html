<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Bem-vindo</title>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg, #667eea, #764ba2);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
      color: white;
      text-align: center;
    }

    .container {
      background: rgba(255,255,255,0.1);
      padding: 40px;
      border-radius: 15px;
      backdrop-filter: blur(10px);
    }

    h1 {
      margin-bottom: 20px;
    }

    p {
      margin-bottom: 30px;
    }

    button {
      padding: 12px 25px;
      background: white;
      color: #333;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background: #ddd;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Bem-vindo 👋</h1>
    <p>Para continuar, faça login ou crie sua conta.</p>

    <button onclick="irParaLogin()">Ir para Login</button>
  </div>

  <script>
    function irParaLogin() {
      window.location.href = "login.html";
    }
  </script>

</body>
</html>
