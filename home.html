<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Painel Inicial</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      background: white;
      width: 450px;
      padding: 40px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 15px 35px rgba(0,0,0,0.25);
    }

    h1 {
      color: #007bff;
      margin-bottom: 10px;
    }

    p {
      color: #666;
      margin-bottom: 30px;
    }

    .btn {
      width: 100%;
      padding: 15px;
      margin-top: 15px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
      color: white;
    }

    .usuarios {
      background: #007bff;
    }

    .usuarios:hover {
      background: #0056b3;
      transform: scale(1.03);
    }

    .fornecedores {
      background: #28a745;
    }

    .fornecedores:hover {
      background: #1f7d35;
      transform: scale(1.03);
    }

    .sair {
      background: #dc3545;
    }

    .sair:hover {
      background: #b02a37;
      transform: scale(1.03);
    }
    .contas {
  background: #6f42c1;
}

.contas:hover {
  background: #56319a;
  transform: scale(1.03);
}
  </style>
</head>

<body>

  <div class="card">
    <h1>Bem-vindo ao Sistema</h1>

    <p>Escolha uma opção abaixo</p>

    <button class="btn usuarios" onclick="irUsuarios()">
      Cadastro de Usuários
    </button>

    <button class="btn fornecedores" onclick="irFornecedores()">
      Cadastro de Fornecedores
    </button>
    
    <button class="btn contas" onclick="irContas()">
  Contas a Pagar
</button>

    <button class="btn sair" onclick="sair()">
      Sair
    </button>
    
    
  </div>

  <script>

    function irUsuarios() {
      window.location.href = "usuarios.html";
    }

    function irFornecedores() {
      window.location.href = "fornecedores.html";
    }

    function sair() {
      window.location.href = "login.html";
    }
   
    function irContas() {
  window.location.href = "contas.html";
}

  </script>

</body>
</html>
