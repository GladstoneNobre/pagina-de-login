<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Painel Inicial</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #333;
    }

    .card {
      background: white;
      width: 420px;
      padding: 40px;
      border-radius: 18px;
      text-align: center;
      box-shadow: 0 15px 35px rgba(0,0,0,0.25);
    }

    h1 {
      margin-bottom: 10px;
      color: #007bff;
    }

    p {
      margin-bottom: 30px;
      color: #555;
      font-size: 16px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 15px;
      transition: 0.3s;
    }

    .btn:hover {
      background: #0056b3;
      transform: scale(1.03);
    }

    .sair {
      background: #dc3545;
    }

    .sair:hover {
      background: #b02a37;
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>Bem-vindo ao Sistema</h1>
    <p>Escolha uma opção abaixo para continuar.</p>

    <button class="btn" onclick="irUsuarios()">Cadastro de Usuários</button>
    <button class="btn sair" onclick="sair()">Sair</button>
  </div>

  <script>
    function irUsuarios() {
      window.location.href = "usuarios.html";
    }

    function sair() {
      window.location.href = "login.html";
    }
  </script>

</body>
</html>
